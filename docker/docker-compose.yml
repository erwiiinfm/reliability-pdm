version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: pdm_db
    environment:
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: pdm_secret
      POSTGRES_DB: pdm
    ports:
      - "5432:5432"
    volumes:
      - pdm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pdm_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pdm_minio
      MINIO_ROOT_PASSWORD: pdm_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pdm_miniodata:/data

  redis:
    image: redis:7-alpine
    container_name: pdm_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pdm_api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://pdm:pdm_secret@db:5432/pdm
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: pdm_minio
      MINIO_SECRET_KEY: pdm_minio_secret
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ~/Downloads:/downloads:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pdm_pgdata:
  pdm_miniodata:
