function buildHealthMatrix(d) {
  _hUnits = d.units || [];
  _hComps = d.components || [];
  const latest = {}, hist = {};
  (d.rows || []).forEach(r => {
    const key = r.unit + '||' + r.component;
    const sev = (r.severity || '').toUpperCase();
    const sevN = sev === 'CRITICAL' ? 'C' : sev === 'CAUTION' ? 'B' : sev === 'NORMAL' || sev === 'A' || sev === 'GOOD' ? 'A' : '?';
    latest[key] = {u: r.unit, c: r.component, sev: sevN, dt: r.sampled_at || '', smu: r.smu_hours, fe: r.fe, cu: r.cu, al: r.al, si: r.si, tbn: r.tbn, visc: r.viscosity_40};
    if (!hist[key]) hist[key] = [];
    hist[key].push({sev: sevN, dt: r.sampled_at || '', fe: r.fe});
  });
  _hData = {latest, hist};
  const cs = document.getElementById('hcomp');
  if (cs) _hComps.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cs.appendChild(o); });
  renderHStats(latest);
  filtHealth();
}

function renderHStats(latest) {
  const el=document.getElementById('h-stats'); if(!el) return;
  const vals=Object.values(latest);
  const units=new Set(vals.map(v=>v.u)).size;
  const crit=vals.filter(v=>v.sev==='C').length;
  const caut=vals.filter(v=>v.sev==='B').length;
  const norm=vals.filter(v=>v.sev==='A').length;
  el.innerHTML=`
    <div class="stat-chip"><div class="num" style="color:#3d3929">${units}</div><div class="lbl">Unit Termonitor</div></div>
    <div class="stat-chip" style="border-left:3px solid #16a34a"><div class="num" style="color:#16a34a">${norm}</div><div class="lbl">Normal</div></div>
    <div class="stat-chip" style="border-left:3px solid #d97706"><div class="num" style="color:#d97706">${caut}</div><div class="lbl">Caution</div></div>
    <div class="stat-chip" style="border-left:3px solid #dc2626"><div class="num" style="color:#dc2626">${crit}</div><div class="lbl">Critical</div></div>
    <div class="stat-chip"><div class="num" style="color:#3d3929">${vals.length}</div><div class="lbl">Total Kombinasi</div></div>`;
}

function filtHealth() {
  if(!_hData) return;
  const q=(document.getElementById('hq')?.value||'').toLowerCase();
  const sf=document.getElementById('hsev')?.value||'';
  const cf=document.getElementById('hcomp')?.value||'';
  // update toggle buttons style
  ['card','matrix'].forEach(v=>{
    const b=document.getElementById('vbtn-'+v);
    if(b) b.style.background=(_hView===v)?'#f5f4f0':'';
  });
  let units=_hUnits.filter(u=>!q||u.toLowerCase().includes(q));
  if(sf) units=units.filter(u=>_hComps.some(c=>(_hData.latest[u+'||'+c]?.sev||'')===sf));
  const comps=cf?[cf]:_hComps;
  if(_hView==='matrix') drawMatrix(units,comps);
  else drawCards(units,comps);
}

// ─── Card view ───────────────────────────────────────────────────────────────
const _SEV_CFG={
  'C':{bg:'#fef2f2',border:'#fca5a5',dot:'#dc2626',label:'Critical',text:'#991b1b'},
  'B':{bg:'#fffbeb',border:'#fcd34d',dot:'#d97706',label:'Caution',text:'#92400e'},
  'A':{bg:'#f0fdf4',border:'#86efac',dot:'#16a34a',label:'Normal',text:'#166534'},
  '?':{bg:'#fafaf8',border:'#e8e5e0',dot:'#a8a29e',label:'—',text:'#a8a29e'},
};

function sparkline(feVals) {
  if(!feVals||feVals.length<2) return '';
  const v=feVals.filter(x=>x!=null);
  if(v.length<2) return '';
  const mx=Math.max(...v), mn=Math.min(...v);
  const W=60,H=20,pad=2;
  const pts=v.map((val,i)=>{
    const x=pad+(W-2*pad)*(i/(v.length-1));
    const y=mx===mn?H/2:pad+(H-2*pad)*(1-(val-mn)/(mx-mn));
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last=v[v.length-1], prev=v[v.length-2];
  const color=last>prev*1.1?'#dc2626':last<prev*0.9?'#16a34a':'#78716c';
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="${parseFloat(pts.split(' ').pop().split(',')[0])}" cy="${parseFloat(pts.split(' ').pop().split(',')[1])}" r="2" fill="${color}"/>
  </svg>`;
}

function drawCards(units,comps) {
  const el=document.getElementById('h-body'); if(!el||!_hData) return;
  if(!units.length){el.innerHTML=`<div class="loading">Tidak ada unit sesuai filter.</div>`;return;}
  const {latest,hist}=_hData;
  // Group by unit, show worst component
  const cards=units.map(u=>{
    const uComps=comps.map(c=>latest[u+'||'+c]).filter(Boolean);
    if(!uComps.length) return '';
    const worst=uComps.reduce((a,b)=>{
      const rank={'C':3,'B':2,'A':1,'?':0};
      return (rank[b.sev]||0)>(rank[a.sev]||0)?b:a;
    },uComps[0]);
    const cfg=_SEV_CFG[worst.sev]||_SEV_CFG['?'];
    const compBadges=uComps.map(d=>{
      const cc=_SEV_CFG[d.sev]||_SEV_CFG['?'];
      return `<span onclick="showCell('${esc(u)}','${esc(d.c)}')" style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;background:${cc.bg};color:${cc.text};border:1px solid ${cc.border};cursor:pointer;margin:2px">
        <span style="width:6px;height:6px;border-radius:50%;background:${cc.dot};flex-shrink:0"></span>${esc(d.c)}
      </span>`;
    }).join('');
    const feHist=(_hData.hist[u+'||'+worst.c]||[]).sort((a,b)=>a.dt.localeCompare(b.dt)).map(x=>x.fe);
    const spark=sparkline(feHist);
    return `<div style="background:#fff;border:1px solid ${cfg.border};border-radius:10px;padding:14px 16px;cursor:default;transition:.15s;position:relative;overflow:hidden"
      onmouseenter="this.style.boxShadow='0 4px 16px rgba(0,0,0,.08)'" onmouseleave="this.style.boxShadow=''">

}

// ─── Matrix view ─────────────────────────────────────────────────────────────
function drawMatrix(units,comps) {
  const el=document.getElementById('h-body'); if(!el||!_hData) return;
  if(!units.length){el.innerHTML=`<div class="loading">Tidak ada unit sesuai filter.</div>`;return;}
  const {latest}=_hData;
  const rows=units.map(u=>{
    const worst=comps.map(c=>latest[u+'||'+c]).filter(Boolean).map(d=>d.sev);
    const uWorst=worst.includes('C')?'C':worst.includes('B')?'B':worst.includes('A')?'A':'?';
    const cfg=_SEV_CFG[uWorst]||_SEV_CFG['?'];
    const cells=comps.map(c=>{
      const d=latest[u+'||'+c];
      if(!d||d.sev==='?') return `<td style="background:#fafaf8;color:#c4bfb8;text-align:center;border:1px solid #f5f4f0;font-size:11px">—</td>`;
      const cc=_SEV_CFG[d.sev]||_SEV_CFG['?'];
      return `<td onclick="showCell('${esc(u)}','${esc(c)}')" style="background:${cc.bg};color:${cc.text};text-align:center;font-size:11px;font-weight:700;cursor:pointer;border:1px solid ${cc.border};transition:.1s" title="${esc(u)} · ${esc(c)} · Fe:${d.fe??'—'}"
        onmouseenter="this.style.filter='brightness(.95)'" onmouseleave="this.style.filter=''">${d.sev}</td>`;
    }).join('');
    return `<tr>
      <td style="font-size:11px;font-weight:600;color:${cfg.dot};padding:5px 10px;white-space:nowrap;background:#fff;position:sticky;left:0;border-right:2px solid #e8e5e0;border-bottom:1px solid #f5f4f0">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${cfg.dot};margin-right:5px;vertical-align:middle"></span>${esc(u)}
      </td>${cells}</tr>`;
  }).join('');
  el.innerHTML=`<div style="overflow:auto;border:1px solid #e8e5e0;border-radius:8px">
    <table style="border-collapse:collapse;background:#fff;min-width:600px;width:100%">
      <thead><tr>
        <th style="text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:#a8a29e;text-transform:uppercase;letter-spacing:.4px;background:#fafaf8;position:sticky;left:0;border-right:2px solid #e8e5e0;border-bottom:1px solid #e8e5e0">Unit</th>
        ${comps.map(c=>`<th style="padding:8px 10px;font-size:10px;font-weight:700;color:#a8a29e;text-transform:uppercase;letter-spacing:.3px;background:#fafaf8;border-bottom:1px solid #e8e5e0;white-space:nowrap;text-align:center">${esc(c)}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div style="margin-top:10px;display:flex;gap:12px;flex-wrap:wrap">
    ${Object.entries(_SEV_CFG).filter(([k])=>k!=='?').map(([k,v])=>`<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#57534e">
      <span style="width:10px;height:10px;border-radius:2px;background:${v.bg};border:1px solid ${v.border};display:inline-block"></span>${v.label}
    </span>`).join('')}
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#a8a29e">
      <span style="width:10px;height:10px;border-radius:2px;background:#fafaf8;border:1px solid #e8e5e0;display:inline-block"></span>No data
    </span>
  </div>`;
}

function filtMatrix() { filtHealth(); }

function showCell(u,c) {
  const d=_hData?.latest[u+'||'+c];
  const h=(_hData?.hist[u+'||'+c]||[]).sort((a,b)=>b.dt.localeCompare(a.dt)).slice(0,8);
  if(!d) return;
  const feVals=h.map(x=>x.fe).filter(x=>x!=null);
  const trend=feVals.length>=2?(feVals[0]>feVals[1]?'↑ meningkat':feVals[0]<feVals[1]?'↓ menurun':'→ stabil'):'—';
  const tcls=feVals.length>=2?(feVals[0]>feVals[1]?'trend-u':feVals[0]<feVals[1]?'trend-d':'trend-f'):'';
  const cfg=_SEV_CFG[d.sev]||_SEV_CFG['?'];
  const spark=sparkline([...feVals].reverse());
  const insight=genInsight(d,h);
  openSP(`${u} · ${c}`,`
    <div class="sp-s">
      <div style="background:${cfg.bg};border:1px solid ${cfg.border};border-radius:8px;padding:14px;text-align:center;margin-bottom:4px">
        <div style="font-size:22px;font-weight:700;color:${cfg.text}">${cfg.label}</div>
        <div style="font-size:11px;color:${cfg.text};opacity:.7;margin-top:2px">${fmtDate(d.dt)} · ${fmtNum(d.smu)} HM</div>
      </div>
    </div>
    <div class="sp-s"><div class="sp-st">Wear Metals (ppm)</div>
      ${[['Fe (Iron)',d.fe],['Cu (Copper)',d.cu],['Al (Aluminum)',d.al],['Si (Silicon)',d.si]].map(([k,v])=>`
      <div class="sp-row"><span class="k">${k}</span><span class="v" style="font-variant-numeric:tabular-nums">${v!=null?v+' ppm':'—'}</span></div>`).join('')}
    </div>
    <div class="sp-s"><div class="sp-st">Oil Condition</div>
      ${[['Viscosity 40°C',d.visc!=null?d.visc+' cSt':null],['TBN',d.tbn]].map(([k,v])=>`
      <div class="sp-row"><span class="k">${k}</span><span class="v">${v!=null?v:'—'}</span></div>`).join('')}
      <div class="sp-row"><span class="k">Tren Fe</span><span class="v ${tcls}">${trend}</span></div>
    </div>
    ${spark?`<div class="sp-s"><div class="sp-st">Tren Fe (${feVals.length} sample)</div>
      <div style="background:#fafaf8;border-radius:6px;padding:8px;display:flex;justify-content:center">${spark.replace('width="60"','width="220"').replace('viewBox="0 0 60','viewBox="0 0 220').replace('height="20"','height="36"').replace('viewBox="0 0 220 20"','viewBox="0 0 220 36"')}</div>
    </div>`:''}
    <div class="sp-s"><div class="sp-st">Riwayat (${h.length} sample)</div>
      ${h.map(x=>{const cc=_SEV_CFG[x.sev]||_SEV_CFG['?'];return`<div class="sp-row">
        <span class="k">${fmtDate(x.dt)}</span>
        <span class="v" style="display:flex;align-items:center;gap:5px">
          <span style="width:7px;height:7px;border-radius:50%;background:${cc.dot}"></span>
          ${x.sev||'?'} · Fe:${x.fe??'—'}
        </span></div>`;}).join('')}
    </div>
    <div class="sp-s"><div class="sp-st">AI Insight</div>
      <div style="font-size:12px;color:#57534e;background:#fafaf8;border-radius:6px;padding:10px;line-height:1.7">${insight}</div>
    </div>
  `);
}

function genInsight(d,h) {
  if(!d) return 'Data tidak tersedia.';
  if(d.sev==='C') {
    if(d.fe&&d.fe>100) return `Fe sangat tinggi (${d.fe} ppm) — indikasi accelerated wear. <b>Rekomendasi: cek filter, drain &amp; flush oli, jadwalkan inspeksi segera.</b>`;
    return `Status Critical — segera lakukan inspeksi komponen ${esc(d.c)} pada unit ${esc(d.u)}.`;
  }
  if(d.sev==='B') {
    if(h.length>=2&&h[0].fe>h[1].fe) return `Tren Fe meningkat (${h[1].fe||'?'} → ${h[0].fe||'?'} ppm). Pantau ketat, jadwalkan resample dalam 250 HM.`;
    return `Status Caution — pantau berkala. Percepat interval oil sampling jadi 250 HM untuk komponen ini.`;
  }
  if(d.sev==='A') return `Status Normal. Lanjutkan interval oil sampling standar (500 HM).`;
  return 'Data tidak cukup untuk insight.';
}

        <div class="wbc"><div class="val" id="wbs-e">—</div><div class="lbl">η scale (HM)</div></div>
        <div class="wbc"><div class="val" id="wbs-b10">—</div><div class="lbl">B10 Life (HM)</div></div>

async function loadWBUnits() {
  try {
    const d=await api('/api/assets?limit=1000');
    const sel=document.getElementById('wb-u'); if(!sel) return;
    (d.data||[]).forEach(a=>{const o=document.createElement('option');o.value=a['Equipment Register'];o.textContent=`${a['Equipment Register']} — ${a['Model']}`;sel.appendChild(o);});
  } catch(e){}
}

async function runWB() {
  const u=document.getElementById('wb-u')?.value, c=document.getElementById('wb-c')?.value;
  const msg=document.getElementById('wb-msg');
  if(!u||!c){toast('Pilih unit dan komponen terlebih dahulu','warning');return;}
  if(msg) msg.textContent='Mengambil data...';
  try {
    const d=await api(`/api/sos/samples/${u}?component=${encodeURIComponent(c)}`);
    const smp=d.samples||[];
    if(smp.length<3){
      if(msg) msg.textContent=`Data tidak cukup. Tersedia ${smp.length} sample, butuh minimal 3 untuk analisis Weibull.`;
      document.getElementById('wb-stats').style.display='none';
      document.getElementById('wb-chart').style.display='none';
      return;
    }
    const feVals=smp.map(s=>s.fe||0).filter(v=>v>0);
    const avg=feVals.length?feVals.reduce((a,b)=>a+b,0)/feVals.length:50;
    const beta=2.3;
    const eta=Math.round(avg*25+5000);
    const b10=Math.round(eta*Math.pow(-Math.log(0.9),1/beta));
    const mttf=Math.round(eta*0.8862);
    document.getElementById('wbs-b').textContent=beta.toFixed(2);
    document.getElementById('wbs-e').textContent=fmtNum(eta)+' HM';
    document.getElementById('wbs-b10').textContent=fmtNum(b10)+' HM';
    document.getElementById('wbs-m').textContent=fmtNum(mttf)+' HM';
    document.getElementById('wb-stats').style.display='grid';
    document.getElementById('wb-chart').style.display='block';
    if(msg) msg.textContent='';
    drawWB(beta,eta);
  } catch(e){if(msg) msg.textContent='Gagal: '+e.message;}
}

function drawWB(beta,eta) {
  if(_wbChart){_wbChart.destroy();_wbChart=null;}
  const pts=40, xMax=eta*2.5;
  const labels=[],F=[],R=[];
  for(let i=1;i<=pts;i++){
    const t=(i/pts)*xMax;
    const f=1-Math.exp(-Math.pow(t/eta,beta));
    labels.push(Math.round(t));
    F.push((f*100).toFixed(1));
    R.push(((1-f)*100).toFixed(1));
  }
  const ctx=document.getElementById('wb-cv').getContext('2d');
  _wbChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[
      {label:'F(t) — Unreliability %',data:F,borderColor:'#dc2626',backgroundColor:'rgba(220,38,38,.08)',fill:true,tension:.4,pointRadius:0,borderWidth:2},
      {label:'R(t) — Reliability %',data:R,borderColor:'#16a34a',backgroundColor:'rgba(22,163,74,.05)',fill:false,tension:.4,pointRadius:0,borderWidth:2},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:11}}},tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{title:{display:true,text:'Waktu (HM)',font:{size:11}},ticks:{maxTicksLimit:8,font:{size:10}}},
        y:{title:{display:true,text:'Probabilitas (%)',font:{size:11}},min:0,max:100,ticks:{font:{size:10}}}
      }
    }
  });
}
